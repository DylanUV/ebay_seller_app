name: ebay_seller_app
description: Lightweight eBay Seller Listings Viewer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.4.0

  # State Management
  flutter_riverpod: ^3.3.2

  # Local Cache / Persistence
  # NOTE: using hive_ce (Community Edition), the actively maintained fork of
  # the original `hive` package, which has been unmaintained since 2022.
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  # Images
  cached_network_image: ^3.3.1
  gal: ^2.3.2

  # Utilities
  intl: ^0.20.3
  url_launcher: ^6.2.5
  share_plus: ^13.2.0
  flutter_cache_manager: ^3.3.1

  # Env variables
  flutter_dotenv: ^5.2.1

  # Web interop (replaces the deprecated dart:html on web builds)
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/